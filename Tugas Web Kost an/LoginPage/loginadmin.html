<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk - Kost Modern</title>
    <link rel="stylesheet" href="loginadmin.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="../icon/favicon-32x32.png" />
  </head>
  <body>
    <div class="register-wrapper">
      <div class="register-card">
        <a href="../index.html" class="btn-back">
          <span>&#8592;</span> Kembali
        </a>

        <div class="profile-upload">
          <div class="image-preview">
            <img
              src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
              alt="Login Icon"
            />
          </div>
          <p class="upload-text">Selamat Datang Kembali</p>
        </div>

        <div class="register-header">
          <h2>Masuk <span>Akun Admin</span></h2>
          <p>Silakan masuk untuk mengelola kost.</p>
        </div>

        <form id="formLogin" class="register-form">
          <div class="input-group">
            <label>Email</label>
            <input
              type="email"
              id="emailLogin"
              placeholder="contoh@mail.com"
              required
            />
          </div>

          <div class="input-group">
            <label>Password</label>
            <input
              type="password"
              id="passwordLogin"
              placeholder="******"
              required
            />
          </div>

          <button type="submit" class="btn-register">Masuk Sekarang</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="loginadmint.js"></script>
  </body>
</html>
