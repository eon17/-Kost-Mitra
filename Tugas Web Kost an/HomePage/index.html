<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kost Modern - Hunian Nyaman</title>
    <link rel="stylesheet" href="HomePage.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Style tambahan untuk tombol dark mode agar terlihat bagus di navbar */
      .dark-mode-btn {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid #4facfe;
        color: #fff;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
        font-family: "Montserrat", sans-serif;
        font-size: 0.8rem;
        margin-right: 15px;
        transition: 0.3s;
      }
      .dark-mode-btn:hover {
        background: #4facfe;
        color: white;
      }
    </style>
    <link rel="icon" type="image/png" href="../icon/favicon-32x32.png" />
  </head>
  <body>
    <nav class="navbar" id="navbar">
      <div class="nav-container">
        <div class="nav-logo">
          <a href="#">Kost <span>Keiren</span></a>
        </div>

        <div class="nav-info">
          <!-- TOMBOL DARK MODE -->
          <button id="dark-mode-toggle" class="dark-mode-btn">
            <span class="mode-icon">🌙 Mode</span>
          </button>

          <a
            href="#info"
            onclick="window.location.href = '../infoumum/infoumum.html'"
            class="info-link"
            >Info Umum</a
          >
        </div>
      </div>
    </nav>

    <section class="hero">
      <div class="overlay"></div>

      <div class="hero-content">
        <div class="text-hero"></div>
        <h1>Kost Kost an<br /><span>Keiren</span></h1>
        <p>Hunian nyaman, strategis, dan aman untuk produktivitasmu.</p>

        <div class="btn-container">
          <button class="btn btn-primary" onclick="openLoginModal()">
            Masuk
          </button>
          <button
            class="btn btn-secondary"
            onclick="window.location.href = '../daftarpage/daftar.html'"
          >
            Daftar
          </button>
        </div>

        <div id="loginModal" class="modal">
          <div class="modal-content">
            <span class="close-modal" onclick="closeLoginModal()">&times;</span>

            <div class="modal-header">
              <h3>Masuk ke <span>Keiren Kost</span></h3>
              <p>Silakan pilih kategori akses Anda</p>
            </div>

            <div class="modal-options">
              <button
                class="opt-btn penyewa"
                onclick="window.location.href = '../LoginPage/login.html'"
              >
                <div class="opt-icon">👥</div>
                <div class="opt-text">
                  <strong>Masuk sebagai Penyewa</strong>
                  <span>Akses kamar dan pembayaran</span>
                </div>
              </button>

              <button
                class="opt-btn admin"
                onclick="window.location.href = '/LoginPage/loginadmin.html'"
              >
                <div class="opt-icon">🔑</div>
                <div class="opt-text">
                  <strong>Masuk sebagai Admin</strong>
                  <span>Kelola unit dan laporan</span>
                </div>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <main class="container">
      <section class="header-section">
        <h1>Sewa Kosan Murah Bulanan</h1>
      </section>

      <div class="room-grid" id="room-grid"></div>
    </main>

    <!-- SCRIPT AREA -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="HomePage.js"></script>
    <script src="darkmode.js"></script>
    <script src="logika.js"></script>
  </body>
</html>
