<!doctype html>

<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Tenant - Kost Keiren</title>
    <link rel="stylesheet" href="user.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Library Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Mencegah Google mengindeks halaman ini -->
    <meta name="robots" content="noindex, nofollow" />

    <style>
      /* Sembunyikan konten sampai verifikasi login selesai */
      body {
        display: none;
      }
    </style>
    <link rel="icon" type="image/png" href="../icon/favicon-32x32.png" />
  </head>

  <body>
    <!-- Letakkan di mana saja navigasi ingin muncul -->
    <div id="navbar-component"></div>

    <!-- 2. Skrip Pemanggil Navbar -->
    <script>
      async function loadNavbar() {
        try {
          const response = await fetch("widget/navbar.html");
          const data = await response.text();
          document.getElementById("navbar-component").innerHTML = data;

          setActiveMenu();

          // Panggil fungsi muatDataTagihan yang ada di tagihan.js
          if (typeof muatDataTagihan === "function") {
            muatDataTagihan();
          }
        } catch (error) {
          console.error("Gagal memuat navbar:", error);
        }
      }

      function setActiveMenu() {
        // Ambil nama file, jika kosong (dashboard utama) anggap user.html
        let currentPage = window.location.pathname.split("/").pop();
        if (currentPage === "" || currentPage === "/") {
          currentPage = "user.html";
        }

        const navLinks = document.querySelectorAll(".sub-nav a");

        navLinks.forEach((link) => {
          // Ambil nilai data-page
          const pageAttr = link.getAttribute("data-page");

          if (pageAttr === currentPage) {
            link.classList.add("active");
          } else {
            link.classList.remove("active"); // Pastikan yang lain tidak ikut aktif
          }
        });
      }

      // Jalankan proses pemuatan
      loadNavbar();
    </script>

    <main class="content">
      <!-- HEADER SECTION -->
      <div class="content-header">
        <div class="title-area">
          <h1>Daftar Kamar Tersedia</h1>
          <p>Temukan kamar yang Sempurna di Kost Keiren.</p>
        </div>
        <div class="stats-area">
          <div class="stat-box">
            <span>TERSEDIA</span>
            <strong id="stat-available">0 Kamars</strong>
          </div>
          <div class="stat-box">
            <span>Harga Rata-Rata</span>
            <strong id="stat-avg">Rp 0</strong>
          </div>
        </div>
      </div>

      <!-- ROOM GRID -->
      <div class="room-grid" id="room-grid"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="user.js"></script>
    <script src="authguard.js"></script>
  </body>
</html>
