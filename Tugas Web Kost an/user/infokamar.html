<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Kamar - Kost Keiren</title>
    <link rel="stylesheet" href="infokamar.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="../icon/favicon-32x32.png" />
  </head>
  <body>
    <nav class="navbar" id="navbar">
      <div class="nav-container">
        <div
          class="nav-logo"
          style="cursor: pointer"
          onclick="window.location.href = 'user.html'"
        >
          <a href="#">Kost <span>Keiren</span></a>
        </div>
        <div class="nav-info">
          <a href="#info" class="info-link">Info Umum</a>
        </div>
      </div>
    </nav>

    <main class="container" id="detail-container">
      <div
        id="loading-text"
        style="text-align: center; margin-top: 50px; color: #4facfe"
      >
        <p style="font-weight: 600">Tunggu sebentar...</p>
        <style>
          @keyframes spin {
            100% {
              transform: rotate(360deg);
            }
          }
          .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
          }
        </style>
        <div class="spinner"></div>
      </div>

      <div id="content-area" style="display: none">
        <div class="room-header">
          <h1 id="detail-title">Kamar -</h1>
          <p>
            📍 Jl. Mangga III No.7, RT.3/RW.9, Cibubur, Kec. Ciracas, Kota
            Jakarta Timur.
          </p>
        </div>

        <div id="room-gallery-container" class="gallery-container"></div>

        <div class="main-content-layout">
          <div class="detail-column">
            <section class="info-card">
              <h2>Spesifikasi Kamar</h2>
              <div class="spec-grid" id="detail-specs"></div>
            </section>

            <section class="info-card">
              <h2>Fasilitas Yang Didapat</h2>
              <div class="facility-groups" id="detail-facilities"></div>
            </section>

            <section class="info-card">
              <h2>Informasi Aturan</h2>
              <div class="rules-grid">
                <div class="rule-box" id="detail-rules">
                  <h3>Aturan Kost</h3>
                </div>
              </div>
            </section>

            <section class="info-card">
              <h2>Lokasi & Akses</h2>
              <div class="map-container">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15861.214417707735!2d106.8815810245166!3d-6.354730305200813!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e69ecec1344037b%3A0xd0edd1b545f2e6ed!2sJl.%20Mangga%20III%20No.7%2C%20RT.3%2FRW.9%2C%20Cibubur%2C%20Kec.%20Ciracas%2C%20Kota%20Jakarta%20Timur%2C%20Daerah%20Khusus%20Ibukota%20Jakarta%2013720!5e0!3m2!1sid!2sid!4v1776779037064!5m2!1sid!2sid"
                  width="100%"
                  height="300"
                  style="border: 0"
                  allowfullscreen=""
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                ></iframe>
              </div>
            </section>
          </div>

          <div class="sticky-card">
            <div class="price-box">
              <p class="label">Harga Sewa</p>
              <h3 id="detail-price">Rp 0 <span>/ bulan</span></h3>
            </div>
            <hr />
            <button
              class="btn-primary"
              id="btn-wa"
              style="
                width: 100%;
                background-color: #25d366;
                border: none;
                color: white;
                padding: 15px;
                border-radius: 12px;
                font-weight: 700;
                cursor: pointer;
              "
            >
              Hubungi Pemilik (WA)
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="infokamar.js"></script>
  </body>
</html>
