<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Saya - Kost Keiren</title>
    <link rel="stylesheet" href="profile.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <meta name="robots" content="noindex, nofollow" />

    <style>
      /* Sembunyikan konten sampai verifikasi login selesai */
      body {
        display: none;
      }
    </style>
    <link rel="icon" type="image/png" href="../icon/favicon-32x32.png" />
  </head>
  <body>
    <a href="user.html" class="back-nav">
      <i class="ph ph-arrow-left"></i> Kembali ke Dashboard
    </a>

    <main class="profile-wrapper">
      <div class="header-section">
        <h1>Pengaturan Profil</h1>
        <p>Kelola informasi identitas dan privasi akun Anda</p>
      </div>

      <div class="profile-grid">
        <aside class="profile-card sidebar">
          <div class="avatar-container">
            <div class="avatar-wrapper">
              <img
                id="mainFotoProfil"
                src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                alt="Profile"
              />
              <label for="uploadFoto" class="camera-icon">
                <i class="ph ph-camera"></i>
              </label>
              <input type="file" id="uploadFoto" hidden accept="image/*" />
            </div>
            <div class="user-meta">
              <h2 id="profileDisplayName">Memuat Nama...</h2>
              <span class="badge-role" id="displayRole">Penghuni Kost</span>
            </div>
          </div>

          <nav class="side-menu">
            <a href="#" class="active"
              ><i class="ph ph-user-circle"></i> Info Personal</a
            >
          </nav>
        </aside>

        <section class="profile-card main-info">
          <div class="card-header">
            <h3><i class="ph ph-address-book"></i> Detail Informasi</h3>
          </div>

          <form id="form-profile" class="modern-form">
            <div class="form-row">
              <div class="form-group">
                <label>Nama Lengkap</label>
                <div class="input-wrapper">
                  <i class="ph ph-user"></i>
                  <input type="text" id="inputName" placeholder="Nama Anda" />
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Email Terdaftar</label>
                <div class="input-wrapper">
                  <i class="ph ph-envelope-simple"></i>
                  <input
                    type="email"
                    id="inputEmail"
                    readonly
                    placeholder="email@contoh.com"
                    style="background-color: #f1f4f9; cursor: not-allowed"
                  />
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Nomor WhatsApp</label>
                <div class="input-wrapper">
                  <i class="ph ph-whatsapp-logo"></i>
                  <input type="text" id="inputPhone" placeholder="0812xxxx" />
                </div>
              </div>
            </div>

            <div
              class="form-actions"
              style="
                margin-top: 20px;
                display: flex;
                flex-direction: column;
                gap: 10px;
              "
            >
              <button
                type="button"
                id="btn-save"
                style="
                  background: #4facfe;
                  color: white;
                  border: none;
                  padding: 15px;
                  border-radius: 12px;
                  font-weight: 700;
                  cursor: pointer;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  gap: 10px;
                "
              >
                <i class="ph ph-floppy-disk"></i> Simpan Perubahan
              </button>

              <button
                type="button"
                class="btn-logout"
                onclick="handleLogout()"
                style="
                  width: 100%;
                  border: 1px solid #ff4d4d;
                  background: transparent;
                  color: #ff4d4d;
                "
              >
                <i class="ph ph-sign-out"></i> Keluar
              </button>
            </div>
          </form>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="profile.js"></script>
    <script src="authguard.js"></script>
  </body>
</html>
